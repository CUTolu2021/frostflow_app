<div class="login-page">
    <div class="login-container">
        <!-- Left Side: Branding + Test Accounts -->
        <div class="branding-section">
            <div class="brand-block">
                <div class="logo">Frostflow</div>
                <p class="brand-subtitle">Retail operations control center</p>
            </div>

            <div class="test-panel">
                <h3>Test Accounts</h3>
                <p>Temporary local credentials for quick validation.</p>
                <div class="test-user-row" *ngFor="let account of testUsers">
                    <span class="role">{{ account.role | uppercase }}</span>
                    <span class="email">{{ account.email }}</span>
                    <span class="password">{{ account.password }}</span>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-section">
            <div class="login-form-card">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in.</p>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        id="email"
                        type="email"
                        placeholder="you@example.com"
                        [formControl]="email"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input-container">
                        <input
                            id="password"
                            [type]="passwordVisible ? 'text' : 'password'"
                            placeholder="Enter your password"
                            [formControl]="password"
                        />
                        <span
                            class="password-toggle"
                            (click)="togglePasswordVisibility()"
                        >
                            <i
                                class="fa"
                                [class.fa-eye]="!passwordVisible"
                                [class.fa-eye-slash]="passwordVisible"
                            ></i>
                        </span>
                    </div>
                </div>

                <button class="login-btn" type="button" (click)="handleLogin()">
                    Login
                </button>
            </div>
        </div>
    </div>
</div>
