<div class="settings-page">
    <div class="settings-card">
        <h2>Settings</h2>
        <p class="subtitle">Account details and security actions.</p>

        <div class="detail-row">
            <span class="label">Name</span>
            <span class="value">{{ userName }}</span>
        </div>
        <div class="detail-row">
            <span class="label">Email</span>
            <span class="value">{{ userEmail }}</span>
        </div>
        <div class="detail-row">
            <span class="label">Role</span>
            <span class="value">{{ userRole }}</span>
        </div>

        <div class="actions">
            <a class="btn ghost" routerLink="/force-password">Change Password</a>
            <button class="btn danger" (click)="signOut()" [disabled]="isSigningOut">
                {{ isSigningOut ? 'Signing out...' : 'Sign Out' }}
            </button>
        </div>
    </div>
</div>
