<div class="force-password">
    <div class="card">
        <h2>Change Your Password</h2>
        <p>This is your first login or your password was reset. Please set a new password.</p>

        <label>Current Password</label>
        <div class="password-field">
            <input [(ngModel)]="currentPassword" [type]="showCurrent ? 'text' : 'password'" />
            <button type="button" class="eye-btn" (click)="toggleCurrentVisibility()">
                <span class="material-symbols-outlined">
                    {{ showCurrent ? 'visibility_off' : 'visibility' }}
                </span>
            </button>
        </div>

        <label>New Password</label>
        <div class="password-field">
            <input [(ngModel)]="nextPassword" [type]="showNext ? 'text' : 'password'" />
            <button type="button" class="eye-btn" (click)="toggleNextVisibility()">
                <span class="material-symbols-outlined">
                    {{ showNext ? 'visibility_off' : 'visibility' }}
                </span>
            </button>
        </div>

        <label>Confirm New Password</label>
        <div class="password-field">
            <input [(ngModel)]="confirmPassword" [type]="showConfirm ? 'text' : 'password'" />
            <button type="button" class="eye-btn" (click)="toggleConfirmVisibility()">
                <span class="material-symbols-outlined">
                    {{ showConfirm ? 'visibility_off' : 'visibility' }}
                </span>
            </button>
        </div>

        <button class="primary-btn" (click)="submit()" [disabled]="isSubmitting">
            {{ isSubmitting ? 'Saving...' : 'Update Password' }}
        </button>
    </div>
</div>
