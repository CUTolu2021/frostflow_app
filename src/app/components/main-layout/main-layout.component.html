<div class="layout-container">
    <!-- Mobile Header -->
    <header class="mobile-header">
        <button class="hamburger-btn" type="button" aria-label="Open navigation" (click)="toggleMobileMenu()">
            <span class="material-symbols-outlined">menu</span>
        </button>
        <div class="mobile-brand-lockup">
            <span class="mobile-brand-mark">F</span>
            <span class="mobile-brand">FrostFlow</span>
        </div>
        <span class="mobile-role">{{ userRole === 'superadmin' ? 'Superadmin' : (userRole === 'sales' ? 'Sales' : 'Admin') }}</span>
    </header>

    <!-- Sidebar with dynamic class for mobile -->
    <app-sidebar class="sidebar" [class.mobile-open]="isMobileMenuOpen"></app-sidebar>

    <!-- Backdrop for mobile -->
    <div *ngIf="isMobileMenuOpen" class="mobile-backdrop" (click)="closeMobileMenu()"></div>

    <main class="main-content">
        <router-outlet></router-outlet>
    </main>
</div>
